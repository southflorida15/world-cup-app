<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-label="Live scores pipeline">
  <defs><style>.bg{fill:#06100b}.box{fill:#0c1a12;stroke:#4ade80;stroke-width:2;rx:16}.api{fill:#132033;stroke:#60a5fa;stroke-width:2;rx:16}.cache{fill:#2b2110;stroke:#fbbf24;stroke-width:2;rx:16}.txt{font-family:Inter,Arial,sans-serif;fill:#d4ead9;font-size:18px;font-weight:700}.small{font-family:Inter,Arial,sans-serif;fill:#9bc9a8;font-size:13px}.arrow{stroke:#7aaa8a;stroke-width:3;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7aaa8a"/></marker></defs>
  <rect class="bg" width="1100" height="500"/>
  <text x="550" y="48" text-anchor="middle" class="txt" font-size="28">Live Scores Pipeline</text>
  <rect x="55" y="190" width="180" height="80" class="box"/><text x="145" y="224" text-anchor="middle" class="txt">React App</text><text x="145" y="249" text-anchor="middle" class="small">polls /api/livescores</text>
  <rect x="295" y="190" width="190" height="80" class="api"/><text x="390" y="224" text-anchor="middle" class="txt">Vercel Function</text><text x="390" y="249" text-anchor="middle" class="small">normalizes responses</text>
  <rect x="545" y="190" width="180" height="80" class="cache"/><text x="635" y="224" text-anchor="middle" class="txt">Redis Cache</text><text x="635" y="249" text-anchor="middle" class="small">TTL + stale fallback</text>
  <rect x="785" y="120" width="250" height="80" class="api"/><text x="910" y="154" text-anchor="middle" class="txt">football-data.org</text><text x="910" y="179" text-anchor="middle" class="small">primary provider</text>
  <rect x="785" y="285" width="250" height="80" class="api"/><text x="910" y="319" text-anchor="middle" class="txt">Highlightly</text><text x="910" y="344" text-anchor="middle" class="small">fallback only</text>
  <path class="arrow" d="M235 230 L290 230"/><path class="arrow" d="M485 230 L540 230"/><path class="arrow" d="M725 218 C760 205 775 185 785 165"/><path class="arrow" d="M725 245 C760 270 775 305 785 325"/><path class="arrow" d="M545 250 C450 335 290 335 235 260"/>
  <text x="550" y="425" text-anchor="middle" class="small">Users share one cached normalized feed instead of each user calling upstream providers.</text>
</svg>
