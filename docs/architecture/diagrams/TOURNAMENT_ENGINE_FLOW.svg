  <rect x="430" y="300" width="240" height="82" class="box"/><text x="550" y="334" text-anchor="middle" class="txt">Winner References</text><text x="550" y="359" text-anchor="middle" class="small">W73, W74, W89...</text>
  <rect x="780" y="300" width="240" height="82" class="box"/><text x="900" y="334" text-anchor="middle" class="txt">Later Rounds</text><text x="900" y="359" text-anchor="middle" class="small">R16 • QF • SF • Final</text>
  <rect x="350" y="480" width="400" height="70" class="gold"/><text x="550" y="510" text-anchor="middle" class="txt">Actual Bracket is Source of Truth</text><text x="550" y="535" text-anchor="middle" class="small">Fantasy reads actual progression, not personal score picks</text>
