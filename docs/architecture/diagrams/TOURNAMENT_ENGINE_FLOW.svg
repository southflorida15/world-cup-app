  <rect x="80" y="110" width="240" height="82" class="box"/><text x="200" y="144" text-anchor="middle" class="txt">Group Stage</text><text x="200" y="169" text-anchor="middle" class="small">12 groups • 72 matches</text>
  <rect x="430" y="110" width="240" height="82" class="box"/><text x="550" y="144" text-anchor="middle" class="txt">Qualifiers</text><text x="550" y="169" text-anchor="middle" class="small">Top 2 + best 8 thirds</text>
